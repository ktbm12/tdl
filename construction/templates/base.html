<head>

            "on-primary": "#ffffff",

            "background": "#f9f9f9",
            "outline": "#777682",
            "surface": "#f9f9f9",
            "surface-container-highest": "#e2e2e2",
            "on-primary-container": "#9896ed",

  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    /* ---- Menu mobile ---- */
    #mobile-menu {
      display: none;
      flex-direction: column;
      gap: 0;
      background: white;
      border-top: 1px solid #e2e2e2;
      padding: 8px 0 16px;
    }
    #mobile-menu.open { display: flex; }
    #mobile-menu a {
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #474551;
      text-decoration: none;
      transition: color 0.2s, background 0.2s;
    }
    #mobile-menu a:hover { color: #170f66; background: #f3f3f3; }
    #mobile-menu a.active { color: #fe771b; border-left: 3px solid #fe771b; padding-left: 21px; }

    /* ---- Modal devis ---- */
    #quote-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    #quote-modal.open { display: flex; }
    #quote-modal .modal-box {
      background: white;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 520px;
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
    }
    #quote-modal label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #474551;
      margin-bottom: 6px;
      margin-top: 16px;
    }
    #quote-modal input,
    #quote-modal select,
    #quote-modal textarea {
      width: 100%;
      border: 1px solid #c8c5d3;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      color: #1a1c1c;
      font-family: Inter, sans-serif;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    #quote-modal input:focus,
    #quote-modal select:focus,
    #quote-modal textarea:focus { border-color: #170f66; }
    #quote-modal textarea { resize: vertical; min-height: 90px; }
    .modal-close {
      position: absolute;
      top: 16px; right: 20px;
      background: none; border: none;
      font-size: 24px; cursor: pointer;
      color: #777682; line-height: 1;
    }
    .modal-close:hover { color: #1a1c1c; }

    /* ---- Statistiques ---- */
    .stat-item { text-align: center; }
    .stat-num { font-family: 'Noto Serif', serif; font-size: 2.5rem; font-weight: 900; color: #170f66; line-height: 1; }
    .stat-label { font-size: 0.85rem; color: #777682; margin-top: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }

    /* ---- Testimonials slider ---- */
    .testimonial-slide { display: none; }
    .testimonial-slide.active { display: block; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; border: none; transition: background 0.3s; }
    .dot.active { background: #fe771b; }

    /* ---- Lazy load placeholder ---- */
    img { background: #e8e8e8; }

    /* Smooth scroll */
    html { scroll-behavior: smooth; }

    /* Hover gap fix pour les liens service */
    .service-link { display: inline-flex; align-items: center; gap: 4px; transition: gap 0.2s; }
    .service-link:hover { gap: 8px; }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body class="bg-surface font-body text-on-surface">

{% include 'partials/navbar.html' %}

<main>
  {% block content %}{% endblock %}
</main>

{% include 'partials/footer.html' %}

{% include 'partials/quote_modal.html' %}

<!-- ======================== SCRIPTS ======================== -->
<script>
  /* ---- Menu mobile ---- */
  let menuOpen = false;
  function toggleMenu() {
    menuOpen = !menuOpen;
    const menu = document.getElementById('mobile-menu');
    const btn = document.getElementById('hamburger');
    menu.classList.toggle('open', menuOpen);
    btn.setAttribute('aria-expanded', menuOpen);
    document.getElementById('hb1').style.transform = menuOpen ? 'rotate(45deg) translate(5px,5px)' : '';
    document.getElementById('hb2').style.opacity = menuOpen ? '0' : '1';
    document.getElementById('hb3').style.transform = menuOpen ? 'rotate(-45deg) translate(5px,-5px)' : '';
  }
  function closeMenu() {
    menuOpen = false;
    document.getElementById('mobile-menu').classList.remove('open');
    document.getElementById('hamburger').setAttribute('aria-expanded', 'false');
    document.getElementById('hb1').style.transform = '';
    document.getElementById('hb2').style.opacity = '1';
    document.getElementById('hb3').style.transform = '';
  }

  /* ---- Modal devis ---- */
  function openModal() {
    document.getElementById('quote-modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeModal() {
    document.getElementById('quote-modal').classList.remove('open');
    document.body.style.overflow = '';
  }
  function handleModalClick(e) {
    if (e.target === document.getElementById('quote-modal')) closeModal();
  }
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });
  function submitQuote() {
    const nom = document.getElementById('q-nom').value.trim();
    const email = document.getElementById('q-email').value.trim();
    const type = document.getElementById('q-type').value;
    if (!nom || !email || !type) {
      alert('Veuillez remplir les champs obligatoires (*).');
      return;
    }
    document.getElementById('form-success').style.display = 'block';
    setTimeout(closeModal, 2500);
  }

  {% block extra_script %}{% endblock %}
</script>

</body>
</html>
