<!-- ======================== MODAL DEVIS ======================== -->
<div
  id="quote-modal"
  role="dialog"
  aria-modal="true"
  aria-labelledby="modal-title"
  onclick="handleModalClick(event)"
>
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()" aria-label="Fermer">
      ×
    </button>
    <h2 id="modal-title" class="font-headline text-3xl text-primary mb-2">
      Demander un devis
    </h2>
    <p class="text-on-surface-variant text-sm mb-4">
      Nos experts vous répondent sous 48h.
    </p>

    <label for="q-nom">Nom complet *</label>
    <input
      type="text"
      id="q-nom"
      name="nom"
      placeholder="Ex : Jean Dupont"
      required
      autocomplete="name"
    />

    <label for="q-email">Adresse e-mail *</label>
    <input
      type="email"
      id="q-email"
      name="email"
      placeholder="vous@exemple.com"
      required
      autocomplete="email"
    />

    <label for="q-tel">Téléphone</label>
    <input
      type="tel"
      id="q-tel"
      name="tel"
      placeholder="+237 6 XX XX XX XX"
      autocomplete="tel"
    />

    <label for="q-type">Type de projet *</label>
    <select id="q-type" name="type" required>
      <option value="" disabled selected>Sélectionnez un type</option>
      <option value="batiment">Construction de bâtiment</option>
      <option value="travaux">Travaux publics</option>
      <option value="renovation">Rénovation</option>
      <option value="conseil">Conseil & Ingénierie</option>
      <option value="autre">Autre</option>
    </select>

    <label for="q-budget">Budget estimé</label>
    <select id="q-budget" name="budget">
      <option value="" disabled selected>Sélectionnez une fourchette</option>
      <option>Moins de 50 000 €</option>
      <option>50 000 – 200 000 €</option>
      <option>200 000 – 1 000 000 €</option>
      <option>Plus de 1 000 000 €</option>
    </select>

    <label for="q-desc">Description du projet</label>
    <textarea
      id="q-desc"
      name="description"
      placeholder="Décrivez brièvement votre projet, vos besoins et vos contraintes..."
    ></textarea>

    <button
      onclick="submitQuote()"
      style="
        margin-top: 24px;
        width: 100%;
        background: #fe771b;
        color: white;
        padding: 14px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 16px;
        border: none;
        cursor: pointer;
        transition: background 0.2s;
      "
      onmouseover="this.style.background = '#e5690a'"
      onmouseout="this.style.background = '#fe771b'"
    >
      Envoyer ma demande
    </button>

    <p
      id="form-success"
      style="
        display: none;
        margin-top: 16px;
        color: #2e7d32;
        text-align: center;
        font-weight: 600;
      "
    >
      ✓ Votre demande a bien été envoyée. Nous vous contacterons sous 48h.
    </p>
  </div>
</div>
